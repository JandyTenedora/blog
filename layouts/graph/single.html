{{ define "main" }}
<article id="main" class="graph-page">
  <h1>{{ .Title }}</h1>
  <p class="graph-instructions">Drag to reposition nodes. Scroll to zoom. Hover for labels.</p>
  <div id="graph-container"></div>
  {{ .Content }}
</article>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<link rel="stylesheet" href="{{ .Site.BaseURL }}css/graph.css">
<script>window.GRAPH_DATA_URL = "{{ .Site.BaseURL }}data/graph.json";</script>
<script src="{{ .Site.BaseURL }}js/graph.js"></script>
{{ end }}
